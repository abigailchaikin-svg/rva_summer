<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Richmond Summer Routes</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4rYpVLXv1GNbbZKj7Soh3uA2YcDHo9u2/DR+Z8E8Io="
    crossorigin="anonymous"
  />

  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>Richmond Summer Routes</h1>
      <p class="lead">Plan trips to RVA summer events using bike routes &amp; buses.</p>

      <section class="panel">
        <h2>Events</h2>
        <div class="form-row">
          <label for="eventType">Event Type</label>
          <select id="eventType">
            <option value="all" selected>All</option>
            <option value="concert">Maymont Summer Nights</option>
            <option value="garden">Lewis Ginter: Flowers After 5</option>
            <option value="river">James River Water Activities</option>
            <option value="yoga">Outdoor Yoga (Brown’s Island/Maymont)</option>
            <option value="soccer">Richmond Kickers (City Stadium)</option>
            <option value="baseball">Flying Squirrels (The Diamond)</option>
          </select>
        </div>
        <button id="loadEventsBtn" type="button">Load/Refresh Events</button>
        <div id="eventsList" class="list" aria-live="polite"></div>
      </section>

      <section class="panel">
        <h2>Map Layers</h2>
        <div class="inline-group">
          <label><input type="checkbox" id="toggleStops" checked /> Bus Stops (GRTC)</label>
          <label><input type="checkbox" id="toggleDayRoutes" checked /> Bus Routes — Day</label>
          <label><input type="checkbox" id="toggleNightRoutes" /> Bus Routes — Night</label>
          <label><input type="checkbox" id="toggleTrails" checked /> Bike Routes / Trails</label>
        </div>
      </section>

      <section class="panel">
        <h2>Create Your Route</h2>

        <div class="form-row">
          <label for="startInput">Start (address or place)</label>
          <input id="startInput" type="text" placeholder="e.g., 900 E Broad St, Richmond VA" />
        </div>

        <div class="form-row">
          <label for="destinationSelect">Destination Event</label>
          <select id="destinationSelect">
            <option value="">(Load events first)</option>
          </select>
        </div>

        <div class="form-row">
          <label for="modeSelect">Mode of Transportation</label>
          <select id="modeSelect">
            <option value="foot-walking">Walk</option>
            <option value="cycling-regular" selected>Bike</option>
            <option value="bus">Bus</option>
          </select>
        </div>

        <button id="routeBtn" type="button">Build Route</button>
        <div id="routeSummary" class="list" aria-live="polite"></div>
      </section>

      <footer class="muted">Basemap: OpenStreetMap via Leaflet.</footer>
    </aside>

    <main id="map" role="application" aria-label="Map"></main>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-SHMf0vGv8CwW2qQnI0gZpIbR0ZqTnqkEw3p3LrjvCxo="
    crossorigin="anonymous"
  ></script>

  <!-- Your app -->
  <script src="app.js"></script>
</body>
</html>
