<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Richmond Summer Routes</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <!-- App styles -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>Richmond Summer Routes</h1>
      <p class="lead">Plan trips to RVA summer events using bike routes &amp; GRTC buses.</p>

      <!-- EVENTS -->
      <section class="panel">
        <h2>Events</h2>
        <div class="form-row">
          <label for="eventType">Event Type</label>
          <select id="eventType">
            <option value="all" selected>All</option>
            <option value="concert">Concert</option>
            <option value="garden">Garden</option>
            <option value="river">River</option>
            <option value="yoga">Yoga</option>
            <option value="soccer">Soccer</option>
            <option value="baseball">Baseball</option>
          </select>
        </div>
        <button id="loadEventsBtn" type="button">Load / Refresh Events</button>
        <div id="eventsList" class="list"></div>
      </section>

      <!-- MAP LAYERS -->
      <section class="panel">
        <h2>Map Layers</h2>
        <div class="inline-group">
          <label><input type="checkbox" id="toggleStops" checked /> Bus Stops</label>
          <label><input type="checkbox" id="toggleDayRoutes" checked /> Bus Routes (Day)</label>
          <label><input type="checkbox" id="toggleNightRoutes" /> Bus Routes (Night)</label>
          <label><input type="checkbox" id="toggleTrails" checked /> Bike Routes</label>
        </div>
      </section>

      <!-- ROUTING -->
      <section class="panel">
        <h2>Create Your Route</h2>

        <div class="form-row">
          <label for="startInput">Start location</label>
          <input id="startInput" type="text" placeholder="900 E Broad St, Richmond VA" />
        </div>

        <div class="form-row">
          <label for="destinationSelect">Destination Event</label>
          <select id="destinationSelect">
            <option value="">(Load events first)</option>
          </select>
        </div>

        <div class="form-row">
          <label for="modeSelect">Mode</label>
          <select id="modeSelect">
            <option value="foot-walking">Walk</option>
            <option value="cycling-regular" selected>Bike</option>
            <option value="bus">Bus</option>
          </select>
        </div>

        <button id="routeBtn" type="button">Build Route</button>
        <div id="routeSummary" class="list"></div>
      </section>
    </aside>

    <main id="map"></main>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <!-- App JS -->
  <script src="app.js"></script>
</body>
</html>
